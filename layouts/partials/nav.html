<!-- <a href="{{ "" | relURL }}">Home</a> -->
{{ range .Site.Menus.main }}
{{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink (.URL | relURL)) }}
<a href="{{ .URL }}" class="nav-link{{ if $active }} is-active{{ end }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
{{ end }}
{{ with .Site.GetPage "/blog" }}
{{ $active := or (eq $.RelPermalink .RelPermalink) (eq $.Section "blog") }}
<a href="{{ .RelPermalink }}" class="nav-link{{ if $active }} is-active{{ end }}"{{ if $active }} aria-current="page"{{ end }}>Blog</a>
{{ end }}
