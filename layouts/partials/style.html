<style>
  :root {
    color-scheme: light dark;
    --bg: #f8faf9;
    --text: #2d3330;
    --muted: #66736d;
    --heading: #171b19;
    --link: #2b6f73;
    --link-hover: #164f54;
    --border: #d9e0dc;
    --surface: #ffffff;
    --code-bg: #eef3f1;
  }

  * {
    box-sizing: border-box;
  }

  html {
    background: var(--bg);
  }

  body {
    font-family:
      ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
    margin: auto;
    padding: clamp(18px, 5vw, 32px);
    width: 100%;
    max-width: 760px;
    text-align: left;
    background-color: var(--bg);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.75;
    color: var(--text);
    letter-spacing: 0;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6,
  strong,
  b {
    color: var(--heading);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    line-height: 1.25;
    margin: 2rem 0 0.85rem;
  }

  h1 {
    font-size: 2rem;
  }

  h2 {
    font-size: 1.45rem;
  }

  h3 {
    font-size: 1.18rem;
  }

  p {
    margin: 0 0 1.15rem;
  }

  a {
    color: var(--link);
    text-decoration-thickness: 1px;
    text-underline-offset: 0.18em;
    transition:
      color 0.16s ease,
      border-color 0.16s ease,
      background-color 0.16s ease;
  }

  a:hover {
    color: var(--link-hover);
  }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--link);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .site-header {
    margin: 0 0 2.7rem;
    padding-top: 0.2rem;
  }

  .title {
    text-decoration: none;
    border: 0;
  }

  .site-title {
    display: inline-block;
    color: var(--heading);
  }

  .site-title h2 {
    margin: 0;
    font-size: 1.7rem;
    font-weight: 650;
    letter-spacing: 0;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 1.45rem;
    margin-top: 1.05rem;
  }

  a.nav-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.96rem;
    font-weight: 500;
    line-height: 1.5;
    border-bottom: 1px solid transparent;
    padding: 0.1rem 0;
  }

  a.nav-link:hover,
  a.nav-link.is-active {
    color: var(--heading);
    border-bottom-color: var(--border);
  }

  textarea {
    width: 100%;
    font-size: 16px;
  }

  input {
    font-size: 16px;
  }

  main {
    min-height: 55vh;
  }

  content,
  .content-body {
    display: block;
  }

  content {
    line-height: 1.75;
  }

  .page-header,
  .list-header {
    margin-bottom: 2rem;
  }

  .page-header h1,
  .list-header h1 {
    margin-top: 0;
    margin-bottom: 0.55rem;
  }

  .page-meta,
  .page-edited,
  .home-updated,
  .archive-date,
  .post-summary,
  .list-intro,
  footer {
    color: var(--muted);
  }

  .page-meta,
  .page-edited,
  .home-updated,
  .archive-date,
  footer {
    font-size: 0.92rem;
  }

  .page-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem 0.85rem;
    margin: 0;
  }

  .page-meta a {
    color: inherit;
  }

  .page-edited {
    margin-top: 2.75rem;
  }

  .home-updated {
    margin-bottom: 1.4rem;
  }

  .content-body ul,
  .content-body ol {
    padding-left: 1.35rem;
  }

  .content-body li + li {
    margin-top: 0.35rem;
  }

  table {
    display: block;
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    border-spacing: 0;
    border-collapse: collapse;
    margin: 1.5rem 0;
  }

  th,
  td {
    border-bottom: 1px solid var(--border);
    padding: 0.45rem 0.6rem;
    text-align: left;
  }

  img {
    display: block;
    max-width: 100%;
    height: auto;
  }

  .content-body img {
    margin: 1.6rem 0 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
  }

  .content-body img[alt="wechat"] {
    width: min(320px, 82vw);
    margin-left: auto;
    margin-right: auto;
  }

  code {
    font-family:
      ui-monospace,
      SFMono-Regular,
      Menlo,
      Monaco,
      Consolas,
      "Liberation Mono",
      monospace;
    font-size: 0.92em;
  }

  :not(pre) > code {
    padding: 0.12rem 0.32rem;
    border-radius: 4px;
    background-color: var(--code-bg);
  }

  pre {
    margin: 1.5rem 0;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    background-color: var(--code-bg);
  }

  pre code {
    display: block;
    min-width: max-content;
    padding: 1rem;
    color: var(--text);
    background: transparent;
    white-space: pre;
    font-size: 0.86rem;
    overflow-x: auto;
  }

  div.highlight {
    margin: 1.5rem 0;
  }

  div.highlight pre {
    margin: 0;
  }

  div.highlight pre {
    color: var(--text);
  }

  div.highlight code {
    background-color: transparent;
    color: inherit;
  }

  blockquote {
    margin: 1.5rem 0;
    border-left: 2px solid var(--border);
    color: var(--muted);
    padding: 0.2rem 0 0.2rem 1rem;
  }

  blockquote p:last-child {
    margin-bottom: 0;
  }

  #TableOfContents {
    display: block;
    margin: 1.5rem 0 2rem;
    padding: 0.85rem 1rem;
    border-left: 2px solid var(--border);
    background: var(--surface);
  }

  #TableOfContents ul {
    margin: 0;
    padding-left: 1.05rem;
  }

  #TableOfContents li + li {
    margin-top: 0.25rem;
  }

  #TableOfContents a {
    color: var(--muted);
    text-decoration: none;
  }

  #TableOfContents a:hover {
    color: var(--link-hover);
    text-decoration: underline;
  }

  footer {
    margin-top: 3rem;
    padding: 1.5rem 0 0.4rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .helptext {
    color: var(--muted);
    font-size: small;
  }

  .errorlist {
    color: #eba613;
    font-size: small;
  }

  /* blog posts */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
    margin: 1.5rem 0 0;
    border-top: 1px solid var(--border);
  }

  ul.blog-posts li {
    display: grid;
    grid-template-columns: 9.5rem minmax(0, 1fr);
    gap: 0.75rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
  }

  ul.blog-posts li span {
    min-width: 0;
  }

  ul.blog-posts li a:visited {
    color: #8b6fcb;
  }

  .archive-body {
    min-width: 0;
  }

  a.list-item-link {
    color: var(--heading);
    text-decoration: none;
    font-weight: 600;
  }

  a.list-item-link:hover {
    color: var(--link-hover);
    text-decoration: underline;
  }

  .post-summary {
    margin: 0.25rem 0 0;
    font-size: 0.96rem;
    line-height: 1.55;
  }

  .gallery {
    display: grid;
    gap: 2rem;
  }

  .gallery-item {
    margin: 0;
  }

  .gallery-item + .gallery-item {
    margin-top: 2rem;
  }

  .gallery-item img {
    width: 100%;
    margin: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
  }

  .gallery-item figcaption {
    padding-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.55;
  }

  .gallery-item figcaption strong {
    display: block;
    margin-bottom: 0.15rem;
    color: var(--heading);
    font-weight: 650;
  }

  .gallery-item figcaption span {
    display: block;
  }

  .gallery-item figcaption p {
    margin: 0.45rem 0 0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f2422;
      --text: #dbe2de;
      --muted: #9aa9a2;
      --heading: #f3f6f4;
      --link: #8ccfd0;
      --link-hover: #b8e7e5;
      --border: #3a4540;
      --surface: #272d2a;
      --code-bg: #303734;
    }

    textarea,
    input {
      background-color: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    ul.blog-posts li a:visited {
      color: #c1a7e8;
    }
  }

  @media (max-width: 540px) {
    body {
      line-height: 1.7;
    }

    h1 {
      font-size: 1.72rem;
    }

    .site-header {
      margin-bottom: 2.2rem;
    }

    nav {
      gap: 0.25rem 1.05rem;
    }

    ul.blog-posts li {
      grid-template-columns: 1fr;
      gap: 0.25rem;
      padding: 0.95rem 0;
    }

    .page-meta {
      display: block;
    }

    .page-meta span {
      display: block;
    }
  }

</style>
