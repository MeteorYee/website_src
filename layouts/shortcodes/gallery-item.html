{{- $src := .Get "src" -}}
{{- $title := .Get "title" -}}
{{- $alt := .Get "alt" | default $title -}}
{{- $meta := .Get "meta" -}}
{{- $caption := trim .Inner "\n\r\t " -}}
{{- .Page.Store.Set "hasImageZoom" true -}}
<figure class="gallery-item">
  <button class="gallery-image-button" type="button" aria-label="{{ printf "Open image: %s" (default $alt $title) }}">
    <img src="{{ $src | safeURL }}" alt="{{ $alt }}" loading="lazy" decoding="async">
  </button>
  <figcaption>
    {{ with $title }}<strong>{{ . }}</strong>{{ end }}
    {{ with $meta }}<span>{{ . }}</span>{{ end }}
    {{ with $caption }}<p>{{ . }}</p>{{ end }}
  </figcaption>
</figure>
